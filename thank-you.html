<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Reunión confirmada! — Zerocode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background-color: #06070F;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* SVG background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg svg {
      width: 100%;
      height: 100%;
    }

    /* Content */
    .card {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 90%;
      text-align: center;
      padding: 64px 48px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,220,252,0.2);
      border-radius: 24px;
      backdrop-filter: blur(12px);
    }

    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 36px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 96px;
      height: 96px;
    }

    .eyebrow {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #00DCFC;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 24px;
      background: linear-gradient(273deg, #00DCFC 0%, #ffffff 60%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 20px;
      font-weight: 400;
      line-height: 1.7;
      color: rgba(255,255,255,0.75);
    }

    .site-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 40px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .site-link:hover { color: #00DCFC; }
    .site-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    .logo {
      display: block;
      margin: 0 auto 40px;
      height: 36px;
      width: auto;
    }
  </style>
</head>
<body>

  <!-- SVG background (mismo que funnel-es) -->
  <div class="bg" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="zc-base" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#0a0b14"/>
          <stop offset="45%"  stop-color="#0f1228"/>
          <stop offset="80%"  stop-color="#160e38"/>
          <stop offset="100%" stop-color="#000000"/>
        </linearGradient>
        <radialGradient id="zc-blob-indigo" cx="50%" cy="75%" r="62%">
          <stop offset="0%"   stop-color="#4f46e5" stop-opacity="0.85"/>
          <stop offset="30%"  stop-color="#3730c8" stop-opacity="0.60"/>
          <stop offset="60%"  stop-color="#221898" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="#000000"  stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="zc-blob-blue" cx="42%" cy="50%" r="48%">
          <stop offset="0%"   stop-color="#2563eb" stop-opacity="0.60"/>
          <stop offset="45%"  stop-color="#1d4ed8" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="#000000"  stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="zc-blob-purple" cx="78%" cy="78%" r="48%">
          <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.70"/>
          <stop offset="35%"  stop-color="#5b21b6" stop-opacity="0.45"/>
          <stop offset="70%"  stop-color="#3b0e8a" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#000000"  stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="zc-hotspot" cx="50%" cy="55%" r="30%">
          <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.45"/>
          <stop offset="50%"  stop-color="#7c3aed" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#000000"  stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="zc-vig-top" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#0a0b14" stop-opacity="1"/>
          <stop offset="18%"  stop-color="#0a0b14" stop-opacity="1"/>
          <stop offset="42%"  stop-color="#0a0b14" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="zc-vig-bottom" x1="0" y1="0" x2="0" y2="1">
          <stop offset="58%"  stop-color="#000000" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
        </linearGradient>
      </defs>
      <rect width="1440" height="900" fill="url(#zc-base)"/>
      <rect width="1440" height="900" fill="url(#zc-blob-indigo)"/>
      <rect width="1440" height="900" fill="url(#zc-blob-blue)"/>
      <rect width="1440" height="900" fill="url(#zc-blob-purple)"/>
      <rect width="1440" height="900" fill="url(#zc-hotspot)"/>
      <rect width="1440" height="900" fill="url(#zc-vig-top)"/>
      <rect width="1440" height="900" fill="url(#zc-vig-bottom)"/>
    </svg>
  </div>

  <div class="card">
    <img
      class="logo"
      src="https://zerocode.la/wp-content/uploads/2025/06/Mesa-de-25@2x-8-1.png"
      alt="Zerocode"
    />

    <div class="icon">
      <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="icon-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#00DCFC" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#00DCFC" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="icon-ring" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#00DCFC"/>
            <stop offset="100%" stop-color="#4f46e5"/>
          </linearGradient>
          <linearGradient id="icon-check" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#00DCFC"/>
          </linearGradient>
        </defs>
        <!-- Outer glow -->
        <circle cx="48" cy="48" r="48" fill="url(#icon-glow)"/>
        <!-- Outer ring faint -->
        <circle cx="48" cy="48" r="45" stroke="rgba(0,220,252,0.15)" stroke-width="1"/>
        <!-- Main circle background -->
        <circle cx="48" cy="48" r="36" fill="rgba(0,220,252,0.08)"/>
        <!-- Gradient ring -->
        <circle cx="48" cy="48" r="36" stroke="url(#icon-ring)" stroke-width="2"/>
        <!-- Inner circle subtle -->
        <circle cx="48" cy="48" r="27" fill="rgba(0,220,252,0.10)"/>
        <!-- Checkmark -->
        <path d="M32 49.5L42.5 60L64 36" stroke="url(#icon-check)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="eyebrow">Confirmación de reunión</p>

    <h1>¡La reunión ya fue programada!</h1>

    <p>Tu reunión ya está confirmada y en camino te llega un correo con todos los detalles y el enlace de acceso.</p>

    <a class="site-link" href="https://zerocode.la" target="_blank" rel="noopener">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 1.5C4 1.5 1.5 4 1.5 7S4 12.5 7 12.5 12.5 10 12.5 7 10 1.5 7 1.5Z" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7 1.5C5.5 3.5 5.5 10.5 7 12.5M7 1.5C8.5 3.5 8.5 10.5 7 12.5M1.5 7h11" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      zerocode.la
    </a>
  </div>

</body>
</html>
